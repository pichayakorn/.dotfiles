general.import = ["~/.config/alacritty/themes/catppuccin-mocha.toml"]

[env]
TERM = "alacritty"

[font]
size = 18.0
offset = { x = 1, y = 1 }

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.bold_italic]
family = "IosevkaTerm Nerd Font"
style = "Bold Italic"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[scrolling]
history = 50000

[window]
opacity = 0.9
padding = { x = 3, y = 3 }
dynamic_padding = true # Keeps content centered if window size is uneven

[window.dimensions]
columns = 100
lines = 32
